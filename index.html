<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BentoArchitect - Premium Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bento-container">
        <div class="bento-item form-box">
            <h2>Send a Message</h2>
            <form action="https://formspree.io/f/your-id" method="POST" id="contact-form">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="How can I help?" rows="5" required></textarea>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>

        <div class="bento-item social-box">
            <h3>Connect</h3>
            <div class="social-links">
                <a href="#">Twitter</a>
                <a href="#">LinkedIn</a>
                <a href="#">GitHub</a>
            </div>
        </div>

        <div class="bento-item info-box">
            <h3>Contact Info</h3>
            <p>hello@bentoarchitect.com</p>
            <p>San Francisco, CA</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
